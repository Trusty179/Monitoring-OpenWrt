<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
*{box-sizing:border-box;}

html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    background:#020b14;
    color:#fff;
    font-family:sans-serif;
}

#maincontent, .main, .container, .cbi-map{
    height:100% !important;
    overflow:hidden !important;
}

#monitor-root{
    display:flex;
    flex-direction:column;
    height:100%;
}

/* TOP */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    padding:6px;
}

.card{
    background:linear-gradient(180deg,#061c2a,#04121a);
    border-radius:12px;
    padding:8px;
    box-shadow:0 0 25px rgba(0,255,255,0.2);
}

.title{font-size:11px;opacity:.7;margin-bottom:3px;}
.value{font-size:14px;font-weight:bold;}

/* 🔥 CHART FULL WIDTH */
.chart-card{
    height:130px;
    margin:0;
    padding:0;
}

.chart-card canvas{
    width:100% !important;
    height:100% !important;
    display:block;
}

/* CLIENT */
.client-section{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:6px;
    min-height:0;
}

/* 🔥 SCROLL CLIENT */
#clients{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:6px;
    padding-right:2px;
}

/* SCROLL STYLE */
#clients::-webkit-scrollbar{
    width:4px;
}
#clients::-webkit-scrollbar-thumb{
    background:#00e5ff;
    border-radius:10px;
}

.client{
    padding:6px;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    box-shadow:0 0 12px rgba(0,255,255,0.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.client-left{font-size:11px;}

.client-right{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
}

.status-active{
    color:#00e676;
    font-size:10px;
    text-shadow:0 0 6px #00e676;
}

.status-block{
    color:#ff5252;
    font-size:10px;
    text-shadow:0 0 6px #ff5252;
}

.btn{
    margin-top:2px;
    padding:4px 8px;
    border:none;
    border-radius:6px;
    font-size:10px;
    cursor:pointer;
    color:#fff;
}

.block{
    background:#ff5252;
    box-shadow:0 0 10px #ff5252;
}

.unblock{
    background:#00e676;
    box-shadow:0 0 10px #00e676;
}

/* 🔥 DISCONNECT BUTTON */
.disconnect{
    background:#ff1744;
    box-shadow:0 0 10px #ff1744;
}

/* 🔥 TEMP COLOR */
.temp-green{color:#00e676;text-shadow:0 0 6px #00e676;}
.temp-yellow{color:#ffd600;text-shadow:0 0 6px #ffd600;}
.temp-red{
    color:#ff5252;
    text-shadow:0 0 10px #ff0000;
    animation:blink 0.8s infinite;
}

/* 🔥 CPU COLOR */
.cpu-green{color:#00e676;text-shadow:0 0 6px #00e676;}
.cpu-yellow{color:#ffd600;text-shadow:0 0 6px #ffd600;}
.cpu-red{
    color:#ff5252;
    text-shadow:0 0 10px #ff0000;
    animation:blink 0.8s infinite;
}

/* 🔥 SPEED COLOR */
.speed-green{color:#00e676;text-shadow:0 0 6px #00e676;}
.speed-yellow{color:#ffd600;text-shadow:0 0 6px #ffd600;}
.speed-white{color:#ffffff;}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

</style>
</head>

<body>

<div id="monitor-root">

<div class="grid">
<div class="card">
    <div class="title">⚡ Speed Internet</div>
    <div id="speed" class="value">Loading...</div>
</div>

<div class="card">
    <div class="title">🖥 CPU</div>
    <div id="cpu" class="value">-</div>
    <div id="temp"></div>
</div>
</div>

<div class="chart-card">
    <canvas id="speedChart"></canvas>
</div>

<div class="chart-card">
    <canvas id="cpuChart"></canvas>
</div>

<div class="client-section">
    <div class="title">📶 Client Control</div>
    <div id="clients"></div>
</div>

</div>

<script>

// SHADOW
const shadowPlugin = {
    id:'shadowColor',
    beforeDatasetDraw(chart, args){
        const ctx = chart.ctx;
        ctx.save();
        ctx.shadowColor = args.meta.dataset.options.borderColor;
        ctx.shadowBlur = 25;
    },
    afterDatasetDraw(chart){
        chart.ctx.restore();
    }
};
Chart.register(shadowPlugin);

// DATA
let rx_old=null, tx_old=null;

// FORMAT
function formatSpeed(v){
    if(v < 1) return (v*1024).toFixed(0)+' Kbps';
    return v.toFixed(2)+' Mbps';
}

// GRADIENT
function gradient(ctx,color){
    let g = ctx.createLinearGradient(0,0,0,150);
    g.addColorStop(0,color);
    g.addColorStop(0.5,color.replace('0.9','0.3'));
    g.addColorStop(1,"rgba(0,0,0,0)");
    return g;
}

// SPEED CHART
let ctx1=document.getElementById('speedChart').getContext('2d');
let speedChart=new Chart(ctx1,{
type:'line',
data:{
    labels:Array(20).fill(""),
    datasets:[
    {
        data:Array(20).fill(0),
        borderColor:'#00e5ff',
        backgroundColor:gradient(ctx1,'rgba(0,229,255,0.9)'),
        fill:true,
        tension:.45,
        pointRadius:0
    },
    {
        data:Array(20).fill(0),
        borderColor:'#ff9800',
        backgroundColor:gradient(ctx1,'rgba(255,152,0,0.9)'),
        fill:true,
        tension:.45,
        pointRadius:0
    }]
},
options:{animation:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});

// CPU CHART
let ctx2=document.getElementById('cpuChart').getContext('2d');
let cpuChart=new Chart(ctx2,{
type:'line',
data:{
    labels:Array(20).fill(""),
    datasets:[
    {
        data:Array(20).fill(0),
        borderColor:'#00e676',
        backgroundColor:gradient(ctx2,'rgba(0,230,118,0.9)'),
        fill:true,
        tension:.45,
        pointRadius:0
    },
    {
        data:Array(20).fill(0),
        borderColor:'#ffd600',
        backgroundColor:gradient(ctx2,'rgba(255,214,0,0.9)'),
        fill:true,
        tension:.45,
        pointRadius:0
    }]
},
options:{animation:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});

// FETCH
async function getData(){
    try{
        let res=await fetch('/cgi-bin/yacd.sh?t='+Date.now());
        let text=await res.text();
        if(!text || text[0]!="{") return null;
        return JSON.parse(text);
    }catch{return null;}
}

// LOOP
setInterval(async()=>{

    let d=await getData();
    if(!d) return;

    if(rx_old===null){
        rx_old=d.rx;
        tx_old=d.tx;
        return;
    }

    let down=(d.rx-rx_old)*8/1024/1024;
    let up=(d.tx-tx_old)*8/1024/1024;

    rx_old=d.rx;
    tx_old=d.tx;

    let speedEl = document.getElementById('speed');
    speedEl.classList.remove('speed-green','speed-yellow','speed-white');

    let maxSpeed = Math.max(down, up);

    if(maxSpeed >= 1){
        speedEl.classList.add('speed-green');
    }
    else if(maxSpeed >= 0.1){
        speedEl.classList.add('speed-yellow');
    }
    else{
        speedEl.classList.add('speed-white');
    }

    speedEl.innerHTML =
    '↓ '+formatSpeed(down)+' ↑ '+formatSpeed(up);

    speedChart.data.datasets[0].data.shift();
    speedChart.data.datasets[1].data.shift();

    speedChart.data.datasets[0].data.push(down);
    speedChart.data.datasets[1].data.push(up);

    speedChart.update();

    let cpuEl = document.getElementById('cpu');
    cpuEl.innerText = d.cpu + ' %';
    cpuEl.classList.remove('cpu-green','cpu-yellow','cpu-red');

    if(d.cpu < 10){
        cpuEl.classList.add('cpu-green');
    }
    else if(d.cpu < 20){
        cpuEl.classList.add('cpu-yellow');
    }
    else{
        cpuEl.classList.add('cpu-red');
    }

    let tempEl = document.getElementById('temp');
    tempEl.innerText = d.temp + ' °C';
    tempEl.classList.remove('temp-green','temp-yellow','temp-red');

    if(d.temp < 55){
        tempEl.classList.add('temp-green');
    }
    else if(d.temp < 65){
        tempEl.classList.add('temp-yellow');
    }
    else{
        tempEl.classList.add('temp-red');
    }

    cpuChart.data.datasets[0].data.shift();
    cpuChart.data.datasets[1].data.shift();

    cpuChart.data.datasets[0].data.push(d.cpu);
    cpuChart.data.datasets[1].data.push(d.temp);

    cpuChart.update();

    let box=document.getElementById('clients');
    box.innerHTML='';

    if(d.clients){
        d.clients.forEach(c=>{
            box.innerHTML += `
            <div class="client">
                <div class="client-left">${c.name}<br>${c.ip}</div>
                <div class="client-right">
                    <div class="${c.status==="blocked"?"status-block":"status-active"}">
                        ${c.status==="blocked"?"Blocked":"Active"}
                    </div>

                    <div style="display:flex; gap:4px; margin-top:2px;">
                        <button class="btn disconnect"
                        onclick="fetch('/cgi-bin/yacd.sh?action=disconnect&ip=${c.ip}')">
                        Kick
                        </button>

                        <button class="btn ${c.status==="blocked"?"unblock":"block"}"
                        onclick="fetch('/cgi-bin/yacd.sh?action=${c.status==="blocked"?"unblock":"block"}&ip=${c.ip}')">
                        ${c.status==="blocked"?"Unblock":"Block"}
                        </button>
                    </div>

                </div>
            </div>`;
        });
    }

},1000);

</script>

</body>
</html>
